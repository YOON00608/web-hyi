<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>반려동물 병원 예약 관리 Systems</title>
    <link rel="stylesheet" href="vet.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>반려동물 예약 관리</h1>
        </header>

        <!-- 예약 등록 및 수정 폼 -->
        <section class="form-section">
            <h2>예약 정보 입력</h2>
            <!-- 수정 모드 구분을 위한 hidden ID 필드 -->
            <input type="hidden" id="reservationId">

            <div class="form-grid">
                <div class="input-group">
                    <label for="petName">반려동물 이름</label>
                    <input type="text" id="petName" placeholder="예: 몽이">
                </div>

                <div class="input-group">
                    <label for="ownerName">보호자 이름</label>
                    <input type="text" id="ownerName" placeholder="예: 홍길동">
                </div>

                <div class="input-group">
                    <label for="animalType">동물 종류</label>
                    <input type="text" id="animalType" placeholder="예: 강아지">
                </div>

                <div class="input-group">
                    <label for="doctorName">담당 수의사</label>
                    <input type="text" id="doctorName" placeholder="예: 이준호">
                </div>

                <div class="input-group">
                    <label for="reservationDate">예약 날짜</label>
                    <input type="date" id="reservationDate">
                </div>

                <div class="input-group">
                    <label for="status">예약 상태</label>
                    <select id="status">
                        <option value="예약">예약</option>
                        <option value="진료완료">진료완료</option>
                        <option value="예약취소">예약취소</option>
                    </select>
                </div>

                <div class="input-group full-width">
                    <label for="price">진료비 (원)</label>
                    <input type="number" id="price" placeholder="예: 45000">
                </div>
            </div>

            <div class="btn-group">
                <button type="button" id="saveBtn" class="btn btn-primary">저장</button>
                <button type="button" id="calcelBtn" class="btn btn-secondary">취소</button>
            </div>
        </section>

        <!-- 예약 목록 섹션 -->
        <section class="list-section">
            <div class="list-header">
                <h2>예약 목록</h2>
                <button type="button" id="loadBtn" class="btn btn-outline">목록 새로고침</button>
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>반려동물</th>
                            <th>보호자</th>
                            <th>종류</th>
                            <th>수의사</th>
                            <th>예약일</th>
                            <th>상태</th>
                            <th>진료비</th>
                            <th>관리</th>
                        </tr>
                    </thead>
                    <!-- JS에서 동적으로 <tr>을 채울 영역 -->
                    <tbody id="reservationList">
                        <!-- 예시 로딩 상태 -->
                        <tr>
                            <td colspan="9" class="empty-msg">데이터를 불러오는 중입니다...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script src="vet.js"></script>
</body>

</html>
