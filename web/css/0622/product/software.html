<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC 소프트웨어</title>
    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            background-color: #f5f5f5;
            color: #333;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .header{
            background-color: #333;
            color: #fff;
            padding: 40px 24px;
        }

        .header-container{
            max-width: 1200px;
            margin: 0 auto;
        }

        .header h1{
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 16px;
        }

        .header p{
            font-size: 14px;
            color: #cfd8dc;
        }

        .main-wrapper{
            max-width: 1200px;
            width: 100%;
            margin: 20px auto;
            padding: 0 24px;
            flex: 1;
        }

        .main-grid{
            display: grid;
            grid-template-columns: 180px 1fr 220px;
            gap: 20px;
        }

        .card{
            background-color: #fff;
            border: 1px solid #e0e0e0;
            padding: 24px;
        }

        .sidebar{
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .menu-item{
            background-color: #eceff1;
            color: #37474f;
            padding: 12px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            text-align: left;
            border: none;
            cursor: pointer;
        }

        .content h2{
            font-size: 20px;
            font-weight: bold;
            color: black;
            margin-bottom: 16px;
        }

        .content p{
            font-size: 14px;
            color: #333;
            line-height: 1.6;
            margin-bottom: 24px;
        }

        .content h2.sub-title{
            margin-top: 12px;
        }

        .customer-center{
            background-color: #fffde7;
        }

        .customer-center h2{
            font-size: 18px;
            font-weight: bold;
            color: black;
            margin-bottom: 20px;
        }

        .customer-info{
            font-size: 14px;
            color: #333;
            line-height: 2;
        }

        .footer{
            background-color: #fff;
            border-top: 1px solid #e0e0e0;
            padding: 24px;
            text-align: center;
            font-size: 14px;
            color: #90a4ae;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-container">
            <h1>ABC 소프트웨어</h1>
            <p>기업용 웹 시스템을 개발하는 IT 회사입니다.</p>
        </div>
    </header>

    <div class="main-wrapper">
        <main class="main-grid">

            <nav class="sidebar card">
                <button class="menu-item">회사소개</button>
                <button class="menu-item">서비스</button>
                <button class="menu-item">채용정보</button>
                <button class="menu-item">문의하기</button>
            </nav>

            <article class="content card">
                <h2>회사 소개</h2>
                <p>ABC 소프트웨어는 학원, 병원, 쇼핑몰을 위한 웹 기반 관리 시스템을 개발합니다.
                사용자가 쉽고 빠르게 업무를 처히할 수 있는 서비스를 제공합니다.</p>
                
                <h2 class="sub-title">주요 서비스</h2>
                <p>예약 관리, 회원 관리, 결제 관리, 통계 대시보드 기능을 제공합니다.</p>
            </article>

            <aside class="customer-center card">
                <h2>고객센터</h2>
                <div class="customer-info">
                    <div>전화 : 02-1234-5678</div>
                    <div style="margin-top: 8px;">운영시간: 09:00 ~ 18:00</div>
                </div>
            </aside>

        </main>
        <footer class="footer">
            Copyright 2026 ABC Software
        </footer>
    </div>
    
    
</body>
</html>
