       *{

            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
       }

       body{

            color: #333;
            padding: 40px 20px;
       }
        
        .title{

            font-weight: bold;

        }

        .container{
            max-width: 1200px;

        }

        .product-grid{
            display: grid;

            gap: 20px;
        }

        border-radius: 8px;
        padding: 30px 24px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 240px;
       }

       .product-name{

        margin-bottom: 12px;
       }

       .product-desc{

       .product-price{

            font-weight: 700;
            color: black;
            margin-bottom: 20px;
       }

       .buy-btn{

            color: #fff;
            border: none;
            padding: 12px 0;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;

</head>
