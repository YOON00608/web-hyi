<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: 100px 100px;
            gap: 10px;
        }

        .item{
            background-color: #ddd;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
        }

        /* 기본적으로는 순서대로 자동 배치 되지만, 원하는 위치에 직접 배치할 수 있다.
            grid에서는 칸 자체가 아니라 선(line)을 기준으로 위치를 지정한다.
            선을 기준으로 시작 위치랑 끝 위치를 지정한다. */
        .item1{
            /* 1번  세로선부터 3번 세로선까지 차지 */
            grid-column: 1 / 3;
        }

        .item2{
            grid-column: 3 / 4;
            grid-row: 1 / 3;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="item item1">1</div>
        <div class="item item2">2</div>
        <div class="item">3</div>
        <div class="item">4</div>
        <div class="item">5</div>
    </div>
</body>
</html>
