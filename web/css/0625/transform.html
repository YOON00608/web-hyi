<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body{
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .box{
            margin: 50% auto;
            width: 100px;
            height: 100px;
            background-color: skyblue;
            border-radius: 12px;

            transition: transform 0.5s;
        }

        .box:hover{
            /* translate(x축, y축) */
            /* transform: translate(150px,200px); */
            /* transform: rotate(-45deg); */
            transform: scale(1.3);
        }
    </style>
</head>
<body>
    <!-- ransform : 요소를 움직이거나, 회전시키거나, 확대/축소, 기울이는 기능
            ㄴtranslate : 이동
            ㄴ rotate : 회전
            ㄴ scale : 확대/축소
            ㄴ skew : 기울이기  -->
    <div class="box"></div>
</body>
</html>
