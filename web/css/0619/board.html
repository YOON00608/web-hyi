<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>도서 자유게시판 실습</title>
    <style>
        *{
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body{
            font-family: sans-serif;
            background: #f5f6f7;
            color: #333;
            padding: 40px 20px;
        }

        .board-container{
            max-width: 900px;
            margin: 0 auto;
            background: #fff;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #e3e3e3;
        }

        .board-header{
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            border-bottom: 2px solid #333;

        }

        .board-title{
            font-size: 22px;
            color: green;
            font-weight: bold;
            
        }

        .header-actions{
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .serch-box{
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
                    }

        .write-btn{
            padding: 8px 16px;
            background: green;
            color: #fff;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .list-header{
            background: #eeeeee;
            border-bottom: 1px solid #e3e3e3;
            padding: 8px;
            display: flex;
            justify-content: space-around;
            text-align: center;
            font-weight: bold;
        }

        .post-row{
            border-bottom: 1px solid #eee;
            padding: 10px;
            display: flex;
            justify-content: space-around;
            text-align: center;
        }

        .col-no{
            width: 60px;
        }

        .col-author{
            width: 100px;
        }

        .col-date{
            width: 110px;
        }

        .col-views{
            width: 70px;
        }

        .col-title{
            flex: 1;
            text-align: left;
            padding-left: 10px;
        }

        .col-title a{
            color: #333;
            text-decoration: none;
        }

        .col-title a:hover{
            text-decoration: underline;
        }

        .pagination{
            display: flex;
            justify-content: center;
            gap: 5px;
            padding: 25px 0;
        }

        .page-btn{
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: #fff;
            font-size: 14px;
            border-radius: 4px;
            cursor: pointer;
            color: #555;
        }

        .page-btn.active{
            background: green;
            color: #fff;
            border-color: green;
        }

    </style>
</head>
<body>
    <div class="board-container">
        
        <header class="board-header">
            <h1 class="board-title">📌 자유게시판</h1>
            <div class="header-actions">
                <input type="text" class="serch-box" placeholder="제목을 입력하세요.">
                <button class="write-btn">글쓰기</button>
            </div>
        </header>

        <div class="list-header">
            <span class="col-no">번호</span>
            <span class="col-title">제목</span>
            <span class="col-author">작성자</span>
            <span class="col-date">작성일</span>
            <span class="col-views">조회수</span>
        </div>

        <div class="post-list">
            <div class="post-row">
                <span class="col-no">5</span>
                <span class="col-title"><a href="#">도서관 휴관 안내 (6월 25일)</a></span>
                <span class="col-author">관리자</span>
                <span class="col-date">2026-06-18</span>
                <span class="col-views">128</span>
            </div>

            <div class="post-row">
                <span class="col-no">4</span>
                <span class="col-title"><a href="#">신간 도서 입고 안내드립니다</a></span>
                <span class="col-author">관리자</span>
                <span class="col-date">2026-06-15</span>
                <span class="col-views">96</span>
            </div>

            <div class="post-row">
                <span class="col-no">3</span>
                <span class="col-title"><a href="#">스터디룸 예약 방법 문의드립니다</a></span>
                <span class="col-author">김도윤</span>
                <span class="col-date">2026-06-12</span>
                <span class="col-views">54</span>
            </div>

            <div class="post-row">
                <span class="col-no">2</span>
                <span class="col-title"><a href="#">반납 연체료 관련 질문있어요</a></span>
                <span class="col-author">이서연</span>
                <span class="col-date">2026-06-10</span>
                <span class="col-views">41</span>
            </div>

            <div class="post-row">
                <span class="col-no">1</span>
                <span class="col-title"><a href="#">전자책 대출 서비스 오픈했습니다</a></span>
                <span class="col-author">관리자</span>
                <span class="col-date">2026-06-05</span>
                <span class="col-views">203</span>
            </div>
        </div>

        <div class="pagination">
            <button class="page-btn">이전</button>
            <button class="page-btn active">1</button>
            <button class="page-btn">2</button>
            <button class="page-btn">3</button>
            <button class="page-btn">4</button>
            <button class="page-btn">5</button>
            <button class="page-btn">다음</button>
        </div>
    </div>
</body>
</html>
