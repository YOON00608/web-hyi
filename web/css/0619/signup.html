<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입 페이지</title>
    <style>
        body{
            background: #f4f6f9;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 40px 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .register-container{
            width: 500px;
            background-color: #fff;
            border: 1px solid #e1e4e8;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
        }

        .register-container h2{
            text-align: center;
            margin-bottom: 30px;
            color: #333;
        }

        .form-row{
            display: flex;
            align-items: center;
            margin-bottom: 20px;
        }

        .form-row label{
            width: 100px;
            font-weight: bold;
            color: 495057;
            flex-shrink: 0;
        }

        .form-row input[type="text"],
        .form-row input[type="password"],
        .form-row input[type="email"]{
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        select{
            padding: 8px 12px;
            border: 1px solid #ced4da;
            border-radius: 4px;
            font-size: 14px;
            outline: none;
        }

        .id-wrapper{
            display: flex;
            gap: 10px;
            flex-grow: 1;
        }

        .id-wrapper input{
            flex-grow: 1;
        }

        .btn-check{
            padding: 8px 14px;
            background: #e9eaeb;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            white-space: nowrap;   
        }

        .form-row input[type="text"].full-width,
        .form-row input[type="password"].full-width{
            flex-grow: 1;
        }

        .email-wrapper{
            display: flex;
            align-items: center;
            gap: 8px;
            flex-grow: 1;
        }

        .email-wrapper input{
            flex-grow: 1;
            width: 80%;
        }

        .email-wrapper span{
            color: #6c757d;
        }

        .email-wrapper select{
            flex-grow: 1;
            width: 50%;
        }

        .gender-wrapper{
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .gender-wrapper label{
            width: auto;
            font-weight: normal;
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        .button-group{
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .button-group button{
            padding: 12px 30px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }

        .btn-submit{
            background: green;
            color: white;
            border: none;
        }

        .btn-cancle{
            background: white;
            color: #333;
            border: 1px solid #ced4da;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>회원가입</h2>
        <div class="form-row">
            <label for="user-id">아이디</label>
            <div class="id-wrapper">
                <input type="text" id="user-id" placeholder="아이디를 입력하세요">
                <button class="btn-check">중복확인</button>
            </div>
        </div>

        <div class="form-row">
            <label for="user-pw">비밀번호</label>
            <input type="password" id="user-pw" class="full-width" placeholder="비밀번호를 입력하세요">
        </div>

        <div class="form-row">
            <label for="email-id">이메일</label>
            <div class="email-wrapper">
                <input type="email" id="email-id" placeholder="이메일 아이디">
                <span>@</span>
                <select id="email-domain">
                    <option value="naver.com">naver.com</option>
                    <option value="gmail.com">gmail.com</option>
                    <option value="daum.net">daum.net</option>
                    <option value="direct">직접입력</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <label for="user-address">주소</label>
            <input type="text" id="user-address" class="full-width" placeholder="주소를 입력하세요">
        </div>

        <div class="form-row">
            <label>성별</label>
            <div class="gender-wrapper">
                <input type="radio" name="gender-wrapper">남성
                <input type="radio" name="gender-wrapper">여성
            </div>
        </div>

        <div class="button-group">
            <button type="submit" class="btn-submit">회원가입</button>
            <button type="button" class="btn-cancle">취소</button>
        </div>

    </div>
</body>
</html>
