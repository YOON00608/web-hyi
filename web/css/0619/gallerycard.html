<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>갤러리 실습</title>
    <style>
    
    *{
        margin: 0;
        padding: 0;
    }

    .gallery-container{
        width: 1000px;
        margin: 0 auto;
        font-family: Arial, Helvetica, sans-serif;
    }

    .gallery-container h1{
        text-align: center;
        margin-top: 40px;
        margin-bottom: 40px;
        color: #333;
    }

    .card-list{
        display: flex;
        justify-content: space-around;
    }

    .card{
        width: 300px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 15px;
        box-sizing: border-box;
    }

    .card img{
        width: 100%;
        height: 200px;
        object-fit: cover;
        border-radius: 4px;
    }

    .card h2{
        font-size: 20px;
        margin: 15px 0 10px 0;
        color: #222;
    }

    .card p{
        font-size: 14px;
        color: #666;
        line-height: 1.5;
        margin-bottom: 15px;
    }

    .card button{
        width: 110px;
        background: green;
        color: white;
        padding: 10px 0;
        font-size: 14px;
        cursor: pointer;
        border: none;
        border-radius: 4px;
    }

    </style>
</head>
<body>
    <div class="gallery-container">
        <h1>갤러리</h1>

        <div class="card-list">
            
            <div class="card">
                <img src="/css/0619/image/spring.jpg" alt="봄 풍경">
                <h2>봄 풍경</h2>
                <p>따뜻한 봄날의 풍경입니다.</p>
                <button>자세히 보기</button>
            </div>

            <div class="card">
                <img src="/css/0619/image/summerbeach.jpg" alt="여름 바다">
                <h2>여름 바다</h2>
                <p>시원하고 푸른 여름 바다입니다.</p>
                <button>자세히 보기</button>
            </div>

            <div class="card">
                <img src="/css/0619/image/autumnleaves.jpg" alt="가을 단풍">
                <h2>가을 단풍</h2>
                <p>붉게 물든 가을 단풍 풍경입니다.</p>
                <button>자세히 보기</button>
            </div>

        </div>

    </div>
</body>
</html>
