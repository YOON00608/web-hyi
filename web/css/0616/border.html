<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테두리</title>
    <style>
        /* 테두리 관련 스타일 속성 */
        /* border-width : 테두리 두께
            속성값 : thin, medium, thick, 직접지정 */
        /* border-style :  테두리 스타일
            none, solid, dotted, dashed, double, groove, ridge, inset, outset  */
        /* border-color : 테두리 색 */
        /* border-radius : 둥근 모서리 */
        /* border : 굵기, 스타일, 색을 한 번에 지정하는 축약 속성
            순서는 무관하다. */
        p{  border-width: 5px;
            border-color: blue;}
        
        .box1{border-style: none;}
        .box2{border-style: hidden;}
        .box3{border-style: solid;}
        .box4{border-style: dotted;}
        .box5{border-style: dashed;}
        .box6{border-style: double;}
        .box7{border-style: groove;}
        .box8{border: 3px solid red;}
        .box9{border: green dashed 5px;}

        .div1{border: 2px solid gray;}
        .div2{
            border: 10px solid red;
            width: 200px;
            height: 100px;}

    </style>
</head>
<body>
    <p class="box1">border 테스트</p>
    <p class="box2">border 테스트</p>
    <p class="box3">border 테스트</p>
    <p class="box4">border 테스트</p>
    <p class="box5">border 테스트</p>
    <p class="box6">border 테스트</p>
    <p class="box7">border 테스트</p>
    <p class="box8">border 테스트</p>
    <p class="box9">border 테스트</p>

    <div class="div1">div에 태두리 주기</div>
    <div class="div2">div에 태두리 주기</div>
    <div class="div3">div에 태두리 주기</div>
</body>
</html>
