<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS길이 단위</title>
    <style>
        html{
            font-size: 16px; /* 1rem = 16px */
        }

        div{
            background-color: #74b9ff;
            color: white;
            padding: 10px;
            margin-bottom: 10px;
        }

        .px{
            width: 200px;
        }

        .em{
            width: 10em;
        }

        .rem{
            width: 10rem;
        }

        .percent{
            width: 50%;
        }
    </style>
</head>
<body>
    <div class="px">width: 200px</div>
    <div class="em">width: 10em</div>
    <div class="rem">width: 10rem</div>
    <div class="percent">width: 50%</div>
</body>
</html>
