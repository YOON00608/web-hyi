<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>패딩(Padding)</title>
    <style>
        body{
            background-color: #f7f9fc;
            padding: 20px;
        }

        .box
        {
            width: 200px;
            margin-bottom: 20px;
            background-color: #74b9ff;
            color: white;
            border: 2px solid #0984e3;
        }

        .padding-top{
            padding-top: 30px;
        }

        .padding-right{
            padding-right: 30px;
        }

        .padding-left{
            padding-left: 30px;
        }

        .padding-bottom{
            padding-bottom: 30px;
        }

        .padding-all{
            padding: 30px;
        }

        .padding-four{
            padding: 10px 20px 30px 40px;
        }
    </style>
</head>
<body>
    <h2>Padding 속성 실습</h2>
    
    <div class="box padding-top">padding-topx</div>
    <div class="box padding-right">padding-right</div>
    <div class="box padding-bottom">padding-bottom</div>
    <div class="box padding-left">padding-left</div>
    <div class="box padding-all">padding-all</div>
    <div class="box padding-four">padding-four</div>
</body>
</html>
