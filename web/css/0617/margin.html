<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Margin(마진)</title>
    <style>
        body{
            font-family: "Pretendard", sans-serif;
            background-color: #f9f9fa;
            text-align: center;
            line-height: 1.6;
        }

        .base-box{
            width: 200px;
            height: 80px;
            background-color: #0984e3;
            color: white;
            border-radius: 8px;
            margin: 40px auto;
        }

        .box-top{
            margin-top: 60px;
            background: #74b9ff;
        }

        .box-right{
            margin-right: 100px;
            background: #00cec9;
        }

        .box-left{
            margin-left: 100px;
            background: orange;
        }

        .box-bottom{
            margin-bottom: 60px;
            background: purple;
        }

        /* margin 속성 
            margin: 네 방향의 여백을 한 번에 지정할 수 있다.
            margin: 10px -> 상, 하, 좌, 우
            margin: 10px 20px -> 상하/좌우
            margin: 10px 20px 30px -> 상/좌우/하 
            margin: 10px 20px 30px 40px -> 상, 우, 하, 좌 (시계방향)*/
        
    </style>
</head>
<body>
    <h2>모든 방향에 대한 margin 값 실습</h2>
    <div class="base-box box-top">margin-top</div>
    <div class="base-box box-right">margin-right</div>
    <div class="base-box box-left">margin-left</div>
    <div class="base-box box-bottom">margin-bottom</div>
</body>
</html>
