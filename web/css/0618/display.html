<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox를 이용한 중앙 정렬</title>
    <style>
        .box{
            background: #74b9ff;
            color: white;
            padding: 10px;
            margin: 5px;
            border-radius: 6px;
        }

        .block{
            display: block;
            width: 80px;
            height: 40px;
        }

        .inline{
            display: inline;
            /* 인라인 속성은 크기 조절을 할 수 없다. */
            width: 30px;
            height: 50px; 
        }

        .inline-block{
            display: inline-block;
            width: 100px;
            height: 70px;
        }

        .flex{
            width: 150px;
            height: 150px;
            display: flex;
            
            /* 가로 방향 정렬 */
            justify-content: center;

            /* 세로 방향 정렬 */
            align-items: center;
        }

        .grid{
            display: grid;
            width: 100px;
            height: 100px;
        }

        /* ---------------------------------------------------- */

        /* Transform 정렬
            html 요소를 이동, 회전, 크기 조정, 기울임 등을 통해 변형할 수 있는 css 속성 */
        
            /* position 속성 : html 문서 상에서 요소가 배치되는 방식을 결정 */

            .transform-box{
            width: 200px;
            height: 200px;
            /* position : relative : 요소의 원래 위치를 벗어날 수 있게 해준다.
            원래 위치를 기준으로 상대적으로 이동된 배치를 해준다. */
            position: relative;
        }
        
        .transform-center{
            /* position : absolute : 요소를 문서 흐름에서 제거하고 원하는
            좌표로 직접 배치할 수 있게 해준다. 이때 기준은 가장 가까운 부모이다. */
            position: absolute;
            top: 50%;
            left: 50%;
            /* 왼쪽 위 모서리가 화면 정중앙에 오기 때문에
                자기 크기의 절반만큼 당겨서 요소를 가운데에 맞춘다. */
            transform: translate(-50%,-50%);
        }
        
        
        /* position : static : 문서 흐름에 따라 자연스럽게 쌓인다. */
        /* position : fixed : 브라우저를 기준으로 고정한다.
            스크롤을 해도 따라다니는 버튼/알림에 사용한다. */
        
    </style>
</head>
<body>
    <!-- Flexbox : 요소돌을 한 줄 또는 여러 줄로 자연스럽게 배치,
        정렬, 간격 조절을 위한 레이아웃 시스템이다. -->

    <h3>display: block</h3> <!-- 요소를 블록 속성으로 만든다. -->
    <span class="box block">span 박스1</span>
    <span class="box block">span 박스2</span>
    
    <h3>display: inline</h3> <!-- 요소를 인라인으로 만든다. -->
    <div class="box inline">div 박스3</div>
    <div class="box inline">div 박스4</div>
    
    <h3>display: inline-block</h3>
    <!-- 줄 안에 배치되지만, width/height 줄 수 있는 작은 박스 버튼처럼 쓸 수 있다. -->
    <div class="box inline-block">div 박스5</div>
    <div class="box inline-block">div 박스6</div>

    <h3>display: flex</h3>
    <!-- 안에 있는 자식들을 한 줄에 정렬하거나, 가운데 정렬 등 배치를 쉽게 조절할 수 있게 바꾼다. -->
    <!-- 항상 자식 요소들한테 적용이 된다. -->
    <div class="box flex">div 박스7</div>
    <div class="box flex">
        <div>
            <p>중앙정렬</p> <!-- 줄바꿈이 안 된다. -->
            <button>로그인</button> <!-- 직계자식 관계에서 벗어나면 가능 -->
        </div>
    </div>

    <h3>display: grid</h3>
    <!-- display : grid : 가로/세로 격자 형태 레이아웃을 만들 수 있는 모드 -->
    <div class="box grid">div 박스9</div>
    <div class="box grid">div 박스10</div>

    <!-- ---------------------------------------------------- -->

    <h3> position과 Transform을 이용한 중앙 정렬</h3>

    <div class="box transform-box">
        <div class="transform-center">
            <p>중앙정렬</p>
        </div>
    </div>

</body>
</html>
