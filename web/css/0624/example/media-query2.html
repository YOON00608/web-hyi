<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어 쿼리 레이아웃 실습</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            background-color: #f5f6fa;
        }

        .container{
            display: flex;
            flex-direction: column;
            padding: 20px;
            gap: 10px;
        }

        .card{
            background-color: cornflowerblue;
            text-align: center;
            color: white;
            border-radius: 8px;
            padding: 40px;
            font-size: 18px;
            flex: 1;
        }

        @media(min-width : 768px){
            .container{
                display: flex;
                flex-direction: row;
                justify-content: center;
                align-items: center;
                flex: 1;
            }
        }
    </style>
</head>
<body>
    <h2 style="text-align:center; margin-top:20px;">반응형 레이아웃 예제</h2>
    <div class="container">
        <div class="card">박스 1</div>
        <div class="card">박스 2</div>
  </div>
</body>
</html>
