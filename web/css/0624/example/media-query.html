<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어 쿼리 실습 문제</title>
    <style>
        
        @media(max-width : 768px){
            .card{
                background-color: #3498db;
                font-size: 16px;
            }
        }

        @media(min-width : 768px){
            .card{
                background-color: #2ecc71;
                font-size: 20px;
            }
        }

        @media(min-width : 1024px){
            .card{
                background-color: #9b59b6;
                font-size: 24px;
            }
        }

        .card{
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
        }

    </style>
</head>
<body>
    <div class="card">반응형 카드입니다</div>
</body>
</html>
