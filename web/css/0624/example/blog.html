<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>블로그 페이지 만들기</title>
    <style>

        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body{
            color: #333;
            line-height: 1.6;
            background-color: #f5f6fa;
        }

        a{
            color: inherit;
            text-decoration: none;
        }

        /* 헤더 영역 */

        header{
            background-color: #111827;
            padding: 16px;
            color: #fff;
        }

        .brand{
            font-weight: 700;
        }

        nav{
            margin-top: 8px;
            display: none;
        }

        .nav-list{
            display: flex;
            gap: 12px;
            list-style: none;
            padding: 0;
            margin: 0;
        }
        
        .container{
            max-width: 1100px;
            margin: 0 auto;
            padding: 16px;
        }

        .layout{
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        /* layout , main 영역 */
        .posts{
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
        }

        .card{
            background-color: #fff;
            border: 1px solid #e5e8eb;
            border-radius: 10px;
            overflow: hidden;
            /* 모바일 : 1열 = 100% */
            flex: 1 1 100%;
        }

        .thumb{
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            display: block;
        }

        .content{
            padding: 12px 14px;
        }

        .title{
            font-size: 18px;
            margin: 6px 0 8px;
        }

        .meta{
            font-size: 12px;
            color: #6b7280;
        }

        /* aside 영역 */
        aside{
            background-color: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px 40px;
        }

        footer {
            text-align: center;
            padding: 30px 0;
            color: #777;
            border-top: 1px solid #ddd;
            margin-top: 40px;
        }

        /* 태블릿 화면 */
        @media(min-width : 768px){
            nav{
                display: block;
            }

            /* 레이아웃 2열 : main(유동) + aside(고정 260px) */
            .layout{
                flex-direction: row;
                align-items: flex-start;
            }

            /* flex : flex-grow(증가 비율), flex-shrink(감소 비율), flex-basis(기본 크기) */
            /* flex-basis : auto -> 내가 가진 원래 비율로 사용 */
            main{
                flex: 1 1 auto;
            }

            aside{
                flex: 0 0 260px;
            }

            /* 카드 2열 : 각 카드가 50% - gap의 일부 */
            .card{
                flex: 1 1 calc(50% - 12px);
            }

            .title{
                font-size: 20px;
            }
        }

        /* 데스크탑 화면 */
        @media(min-width : 1024px){
            header{
                /* position: sticky
                    평소에는 일반 요소처럼 움직인다.
                    스크롤해서 특정 위치에 도달하면 고정(fixed)처럼 동작한다. */
                position: sticky;
                top: 0;
                z-index: 10;
            }

            .card{
                flex:1 1 calc(33.3% - 12px);
            }

            .title{
                font-size: 22px;
            }
        }

    </style>
</head>
<body>
    <header>
        <div class="container">
            <div class="brand">My Blog</div>
            <nav>
                <ul class="nav-list">
                    <li><a href="#">홈</a></li>
                    <li><a href="#">카테고리</a></li>
                    <li><a href="#">태그</a></li>
                    <li><a href="#">정보</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <div class="container layout">
        <main>
            <section class="posts">
                
                <article class="card">
                    <img class="thumb" src="https://picsum.photos/800/450?1" alt="사진">
                    <div class="content">
                        <h3 class="title">포스트 제목 1</h3>
                        <p class="meta">2025-11-04 카테고리</p>
                        <p>간단한 소개 문장이다 간단한 소개 문장이다 간단한 소개 문장이다</p>
                    </div>
                </article>

                <article class="card">
                    <img class="thumb" src="https://picsum.photos/800/450?2" alt="사진">
                    <div class="content">
                        <h3 class="title">포스트 제목 2</h3>
                        <p class="meta">2025-11-04 카테고리</p>
                        <p>간단한 소개 문장이다 간단한 소개 문장이다 간단한 소개 문장이다</p>
                    </div>
                </article>

                <article class="card">
                    <img class="thumb" src="https://picsum.photos/800/450?3" alt="사진">
                    <div class="content">
                        <h3 class="title">포스트 제목 3</h3>
                        <p class="meta">2025-11-04 카테고리</p>
                        <p>간단한 소개 문장이다 간단한 소개 문장이다 간단한 소개 문장이다</p>
                    </div>
                </article>

            </section>
        </main>

        <aside>
            <h4>사이드바</h4>
            <ul>
                <li><a href="#">인기글</a></li>
                <li><a href="#">최근 댓글</a></li>
                <li><a href="#">카테고리</a></li>
            </ul>
        </aside>
    </div>

    <footer>
        <small>&copy 2025 My Blog. All rights reserved.</small>
    </footer>
</body>
</html>
