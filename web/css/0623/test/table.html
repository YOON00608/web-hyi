<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>테이블 실습</title>
    <style>

        table{
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
        }

        th, td{
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #dee2e6;
        }

        tr:first-child{
            background-color: #2c3e50;
            color: #fff;
        }

        tr:nth-child(even){
            background-color: #f8f9fa;
        }

        tr:last-child{
            background-color: #eaeded;
            color: #2c3e50;
            font-weight: bold;
        }

        tr:not(:first-child):not(:last-child):hover{
            background-color: #ebf5fb;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <table>
        <h1>사원 성과 테이블</h1>
        <tr>
            <th>사원번호</th>
            <th>이름</th>
            <th>직급</th>
            <th>성과점수</th>
        </tr>
        <tr>
            <td>A001</td>
            <td>김철수</td>
            <td>팀장</td>
            <td>95점</td>
        </tr>
        <tr>
            <td>A002</td>
            <td>이영희</td>
            <td>대리</td>
            <td>88점</td>
        </tr>
        <tr>
            <td>A003</td>
            <td>박민수</td>
            <td>사원</td>
            <td>72점</td>
        </tr>
        <tr>
            <td>A004</td>
            <td>최지우</td>
            <td>사원</td>
            <td>84점</td>
        </tr>
        <tr>
            <td>총계</td>
            <td>4명</td>
            <td>-</td>
            <td>평균 84.75점</td>
        </tr>
    </table>
</body>
</html>
