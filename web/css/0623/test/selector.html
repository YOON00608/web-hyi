<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>의사 클래스 실습</title>
    <style>
        .card{
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            margin-bottom: 12px;
        }

        .card.success{
            border: 1px solid #2ecc71;
            background-color: #e8f8f5;
            color: #1e824c;
        }
        
        .card.danger{
            border: 1px solid #f1c40f;
            background-color: #fef9e7;
            color: #d4ac0d;
        }

        .card.card.danger.critical{
            background-color: #c0392b;
            color: #fff;
        }


    </style>
</head>
<body>
    <h1>문제 1번</h1>
    <div class="card success">성공 메시지</div>
    <div class="card danger">오류 메시지</div>
    <div class="card danger critical">매우 심각한 오류 메시지</div>
</body>
</html>
