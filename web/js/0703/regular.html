<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정규표현식</title>
</head>
<body>
    <script>
        // 정규표현식 : 문자열이 특정 규칙에 맞는지 검사하거나, 원하는 문자를 찾고 바꾸기 위한 표현식

        // 기본 형태 : /패턴/
        let regex = /abc/; // 문자열 안에 abc가 있는지 검사하는 패턴

        // test() 메서드
        // 문자열이 정규식에 맞는지 검사하는 메서드
        // 정규식.text(문자열)
        console.log(regex.test("abc")); // true
        console.log(regex.test("abcd")); // true
        console.log(regex.test("ab")); // false
        console.log(regex.test("hello abc")); // true

        console.log("-----------")
        // 숫자만 입력했는지 검사하는 정규식
        regex = /[0-9]+$/;
        console.log(regex.test("12345"));
        console.log(regex.test("123a"));
        console.log(regex.test("abc"));

        // 영문 소문자와 숫자만 허용
        // 5자 이상 12자 이하
        regex = /^[a-z0-9]{5,12}$/;

        // 이메일 정규식
        console.log("-----------")
        regex = /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}/;
        console.log(regex.test("test@naver.com"));
        console.log(regex.test("test.name@naver.com"));
        console.log(regex.test("testgamil.com"));
        console.log(regex.test("test.name@navercom"));
        console.log(regex.test("test.name@naver.d"));

        // 휴대폰 번호 정규식
        console.log("-----------")
        regex = /^010-[0-9]{4}-[0-9]{4}$/;
        console.log(regex.test("010-1234-5678"));
        console.log(regex.test("010-1234-567"));

        // 자주 쓰는 정규식 기호
        
        // ^ : 문자열 시작 
        // /^a/ = a로 시작해야 한다.
        
        // $ : 문자열 끝
        // /a$/ = a로 끝나야 한다.
        
        // . : 아무 문자 1개
        // /a.c/ = a랑c 사이에 아무 글자라도 1개 와야 한다. (공백도 가능)
        console.log("-----------")
        regex = /a.c/;

        console.log(regex.test("a c")); // true

        // [] : 문자 범위 
        // /[abc]/ = a,b,c 중에 1글자
        
        // [^] : 제외
        // [^0-9] = 숫자가 아니어야 한다.

        // + : 1개 이상
        // /a+/ : a가 1개 이상 나와야 한다.

        // * : 0개 이상
        // /a*/ = a가 없어도 된다.

        // ? : 0 또는 1개

        // {n} : 정확히 n개
        // [0-9]{3} = 0 에서 9까지 3개만 있어야 한다.

        // {n,m} : n개 이상 m개 이하

        // 0-9 : 0 ~ 9 사이 = \d
        // a-z : a ~ z 사이 
        // A-Z : A ~ Z 사이
        // 가-힣 : 가 ~ 힣 사이

        // \w : 영문, 숫자, _ 포함

        // 그룹핑 ()
        // 여러 문자를 하나의 그룹으로 묶는 역할
        // /(abc)+/ = abc라는 그룹을 1번 이상 반복해라
        // /abc+/ = ab하고 c는 1번 이상 반복해라

        // | 또는
        // /(010|011)/ = 010 또는 011

        // (?=...)
        // 전방 탐색 : 앞에 조건이 있는지만 확인
        // (? = .\d) = 앞으로 숫자가 하나라도 있는가.

        // 비밀번호 조건
        // 영어(대,소문자) 특수문자, 숫자를 포함하여 8자 이상 16자 이하
        // regex = /^[A-Za-z0-9!@#$%^&]{8,16}/;

        // 전방탐색으로 영문이 있는지, 숫자가 있는지, 특수문자가 있는지 먼저 검사한다.
        regex = /^(?=.*[A-Za-z](?=.*[!@#$%^&*])[A-Za-z0-9!@#$%^&*]{8,16})/;

        // 1. 영문이 있는가?
        // 2. 숫자가 있는가?
        // 3. 특수문자가 있는가?
        // 4. 실제 비밀번호를 검사

    </script>
</body>
</html>
