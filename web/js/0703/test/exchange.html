<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
    *{
        box-sizing : border-box;
    }

    body{
        margin : 0;
        font-family: Arial, sans-serif;
        background : linear-gradient(135deg, #0f172a, #1e3a8a);
        color : #111827;
        min-height : 100vh;
        display : flex;
        justify-content: center;
        align-items: center;
        padding : 20px;
    }

    .exchange-card{
        width : 100%;
        max-width: 520px;
        background: white;
        border-radius : 22px;
        padding :30px;
        box-shadow: 0 20px 40px rgba(0,0,0,0.25);
    }

    .exchange-card h1{
        margin : 0;
        font-size : 30px;
        color : #1e3a8a;
    }

    .exchange-card p{
        color : #6b7280;
        line-height : 1.5;
    }

    .status{
        margin : 18px 0;
        padding : 14px;
        border-radius : 12px;
        background-color: #eff6ff;
        color : #1d4edf;
        font-weight: bold;
        text-align: center;
    }

    .form-group {
        margin-bottom : 16px;
    }

    label{
        display : block;
        margin-bottom : 7px;
        font-weight : bold;
    }

    input,
    select{
        width : 100%;
        padding : 14px;
        border : 1px solid #d1d5db;
        border-radius : 12px;
        font-size : 16px;
    }

    button{
        width : 100%;
        padding : 15px;
        border : none;
        border-radius : 12px;
        background: #2563eb;
        color : white;
        font-size : 17px;
        font-weight : bold;
        cursor : pointer;
        transition : 0.5s;
    }

    button:hover{
        background-color: #1d4ed8;
        transform: translateY(-2px);
    }

    .result-box{
        display : none;
        margin-top : 24px;
        padding : 22px;
        border-radius : 16px;
        background : #f8fafc;
        border : 1px solid #dbeafe;
    }

    .result-box.show{
        display : block;
    }

    .result-main{
        font-size : 28px;
        font-weight : bold;
        color : #2563eb;
        margin-bottom : 14px;
    }
    
    .result-row{
        display : flex;
        justify-content: space-between;
        border-bottom : 1px solid #e5e7eb;
        padding : 8px 0;
        gap : 10px;
    }

    .result-row span:first-child{
        color : #6b7280;
    }
    </style>
</head>
<body>
    <div class="exchange-card">
        <h1>실시간 환율 계산기</h1>
        <p>USD 기준 환율 데이터를 가져와 선택한 통화로 환산한다.</p>

        <div id="statusBox" class="status">
            환율 정보를 불러오는 중입니다...
        </div>

        <div class="form-group">
            <label for="amountInput">USD 금액</label>
            <input type="number" id="amountInput" placeholder="예 : 100">
        </div>

        <div class="form-group">
            <label for="currencySelect">변화할 통화</label>
            <select id="currencySelect">
                <option value="KRW">KRW - 대한민국 원</option>
                <option value="JPY">JPY - 일본 엔</option>
                <option value="EUR">EUR - 유로</option>
                <option value="GBP">GBP - 영국 파운드</option>
            </select>
        </div>

        <button id="calculateExchange">환율 계산하기</button>

        <div id="resultBox" class="result-box">
            <div id="resultMain" class="result-main"></div>
            <div class="result-row">
                <span>기준 통화</span>
                <strong>USD</strong>
            </div>

            <div class="result-row">
                <span>선택 통화</span>
                <strong id="selectedCurrencyText"></strong>
            </div>

            <div class="result-row">
                <span>입력 금액</span>
                <strong id="inputAmountText"></strong>
            </div>

            <div class="result-row">
                <span>적용 환율</span>
                <strong id="rateText"></strong>
            </div>
            <div class="result-row">
                <span>업데이트 시간</span>
                <strong id="updateTimeText"></strong>
            </div>
        </div>
    </div>
    <script>
        //환율 계산 버튼
        let btn = document.getElementById("calculateExchange");
        let statusBox = document.getElementById("statusBox");
        let resultBox = document.getElementById("resultBox");
        //환율데이터
        let exchangeData = null;


        //환률 계산 버튼을 눌렀을 때
        btn.addEventListener("click", () => {
            //내가 입력한 달러 금액
            const amount = Number(document.getElementById("amountInput").value);

            //내가 바꾸려는 단위를 select에서 선택
            const currency = document.getElementById("currencySelect").value;

            if(exchangeData == null){
                alert("환율 정보가 아직 준비되지 않았습니다.");
                return;
            }

            if(amount <= 0){
                alert("0보다 큰 금액을 입력해주세요");
                return;
            }

            //통화별 비율을 찾는다.
            const rate = exchangeData.rates[currency];
            const result = amount * rate;

            //toLocaleString() : 숫자를 국가 형식에 맞춰 문자열로 변환하는 메서드
            //undefined : 브라우저의 기본 지역 설정을 사용해라
            //{ maximumFractionDigits : 2 } : 소수점을 최대 2자리까지만 표시해라
            document.getElementById("resultMain").innerText = 
                result.toLocaleString(undefined, {
                    maximumFractionDigits : 2
                }) + " " + currency;

            //내가 선택한 통화 단위를 표시
            document.getElementById("selectedCurrencyText").innerText = currency;

            document.getElementById("inputAmountText").innerText = 
                amount.toLocaleString() + " USD";

            document.getElementById("rateText").innerText = 
                "1 USD = " + rate.toLocaleString(undefined, {
                    maximumFractionDigits : 4
                }) + " " + currency;

            document.getElementById("updateTimeText").innerText = 
                exchangeData.time_last_update_utc;

            resultBox.classList.add("show");
        })

        //환율 데이터 가져오기
        async function calculateExchange(){
            //환율 정보를 요청해서
            await fetch("https://open.er-api.com/v6/latest/USD")
            .then(response => {
                //요청이 실패했으면 예외 발생시킴
                if(!response.ok){
                    throw new Error("API 요청 실패");
                }
                //응답 정보를 반환
                return response.json();
            })
            .then(data => {
                if(data.result !== "success"){
                    throw new Error("환율 데이터 오류");
                }

                exchangeData = data;
                statusBox.innerText = "환율 정보를 성공적으로 불러왔습니다";
                console.log(exchangeData);
            })
            .catch(error => {
                console.log(error);
                statusBox.innerText="환율 정보를 불러오지 못했습니다."
            })
        }

        calculateExchange();
    </script>
</body>
</html>
