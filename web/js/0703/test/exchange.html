<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>실시간 환율 계산기</title>
    <style>
        /* 전체 화면 스타일 */
        body {
            background-color: #f3f4f6;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* 계산기 영역 스타일 */
        .converter-container {
            width: 500px;
            background-color: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.15);
            box-sizing: border-box;
        }

        /* 제목 스타일 */
        h1 {
            font-size: 32px;
            color: #2563eb;
            text-align: center;
            margin-top: 0;
            margin-bottom: 10px;
        }

        /* 설명 스타일 */
        p {
            text-align: center;
            color: gray;
            margin-bottom: 25px;
        }

        /* 입력창 및 선택창 공통 스타일 */
        input[type="number"], select {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 16px;
            box-sizing: border-box;
        }

        /* 버튼 스타일 */
        button {
            width: 100%;
            height: 50px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.8;
        }

        /* 결과 영역 스타일 */
        #resultBox {
            background-color: #eff6ff;
            padding: 20px;
            border-radius: 15px;
            margin-top: 20px;
            box-sizing: border-box;
            display: none; 
        }

        /* 결과 상자가 보일 때 적용할 클래스 */
        #resultBox.show {
            display: block;
        }

        .result-item {
            margin: 8px 0;
            font-size: 15px;
            color: #333;
        }

        /* 환산 금액 강조 스타일 */
        .final-amount {
            font-size: 30px;
            font-weight: bold;
            color: #2563eb;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="converter-container">
        <h1>실시간 환율 계산기</h1>
        <p>미국 달러(USD)를 원하는 통화로 실시간 변환해 보세요.</p>

        <!-- USD 입력 -->
        <input type="number" id="usdInput" placeholder="변환할 USD 금액을 입력하세요">

        <!-- 통화 선택 -->
        <select id="currencySelect">
            <option value="KRW">KRW (대한민국 원)</option>
            <option value="JPY">JPY (일본 엔)</option>
            <option value="EUR">EUR (유로)</option>
            <option value="GBP">GBP (영국 파운드)</option>
        </select>

        <!-- 계산 버튼 -->
        <button id="calcBtn">환율 계산하기</button>

        <!-- 결과 출력 영역 -->
        <div id="resultBox">
            <div class="result-item">■ 기준 통화: USD</div>
            <div class="result-item">■ 선택 통화: <span id="targetCurrency">-</span></div>
            <div class="result-item">■ 입력 금액: <span id="inputAmount">-</span> USD</div>
            <div class="result-item">■ 적용 환율: 1 USD = <span id="exchangeRate">-</span></div>
            <div class="result-item">■ 업데이트 시간: <span id="updateTime">-</span></div>
            <div class="final-amount" id="finalResult">0</div>
        </div>
    </div>

    <script>
        // 전역 변수로 환율 데이터를 저장할 객체 선언
        let exchangeRates = {};
        let lastUpdateTime = "";

        // 1 & 2. 페이지 실행 시 API 호출하여 환율 데이터 가져오기
        window.addEventListener('DOMContentLoaded', () => {
            fetch("https://open.er-api.com/v6/latest/USD")
                .then(response => response.json())
                .then(data => {
                    // API에서 환율 목록(rates)과 업데이트 시간(time_last_update_utc) 추출
                    exchangeRates = data.rates;
                    lastUpdateTime = data.time_last_update_utc;
                    console.log("환율 데이터 로드 완료");
                })
                .catch(error => {
                    console.error("데이터를 가져오는 중 오류가 발생했습니다:", error);
                    alert("실시간 환율 데이터를 불러오지 못했습니다. 새로고침을 해주세요.");
                });
        });

        // 계산 버튼 클릭 이벤트 리스너
        document.getElementById('calcBtn').addEventListener('click', () => {
            const usdInput = document.getElementById('usdInput').value;
            const selectedCurrency = document.getElementById('currencySelect').value;
            const resultBox = document.getElementById('resultBox');

            // 3. 입력값 검사
            if (usdInput === "") {
                alert("금액을 입력해주세요.");
                return;
            }
            
            const amount = parseFloat(usdInput);
            if (amount <= 0) {
                alert("0보다 큰 금액을 입력해주세요.");
                return;
            }

            // 환율 데이터가 정상적으로 로드되었는지 확인
            if (!exchangeRates[selectedCurrency]) {
                alert("환율 데이터를 아직 불러오는 중입니다. 잠시 후 다시 시도해주세요.");
                return;
            }

            // 4. 환산 금액 계산 (입력 금액 * 선택한 통화의 환율)
            const rate = exchangeRates[selectedCurrency];
            const convertedAmount = amount * rate;

            // 5 & 6. 결과 출력 및 toLocaleString() 적용
            document.getElementById('targetCurrency').textContent = selectedCurrency;
            document.getElementById('inputAmount').textContent = amount.toLocaleString();
            document.getElementById('exchangeRate').textContent = `${rate.toLocaleString()} ${selectedCurrency}`;
            document.getElementById('updateTime').textContent = lastUpdateTime;
            
            // 최종 환산 금액 출력
            document.getElementById('finalResult').textContent = `${convertedAmount.toLocaleString(undefined, {maximumFractionDigits: 2})} ${selectedCurrency}`;

            // 7. 결과 영역 표시 (classList.add 사용)
            resultBox.classList.add('show');
        });
    </script>

</body>
</html>
