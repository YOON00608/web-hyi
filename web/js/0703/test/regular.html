<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정규표현식 실습</title>
    <style>
        body{
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .register-container{
            background-color: #fff;
            padding: 30px 40px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
        }

        h2{
            text-align: center;
            color: #333;
            margin-bottom: 24px;
        }

        .input-group{
            display: flex;
            flex-direction: column;
            margin-bottom: 18px;

        }

        label{
            font-size: 16px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        input{
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border-color 0.3s;
        }

        input:focus{
            border-color: #4a90e2;
        }

        .message{
            font-size: 12px;
            margin-top: 5px;
            min-height: 5px;
        }

        .message.success{
            color: #2ecc71;
        }

        .message.error{
            color: #e74c3c;
        }

        .submit-btn{
            width: 100%;
            padding: 14px;
            border-radius: 6px;
            background-color: #4a90e2;
            border: none;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s, transform 0.1s;
        }

        .submit-btn:hover{
            background-color: #357abd;
        }

        .submit-btn:active{
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="register-container">
        <h2>회원가입</h2>
        <form id="registerForm" onsubmit="return validateForm(event)">

            <!-- 아이디 입력 -->
            <div class="input-group">
                <label for="userId">아이디</label>
                <input type="text" id="userId" placeholder="영문 소문자+숫자 5~12자">
                <div id="userIdMsg" class="message"></div>
            </div>

            <!-- 비번 입력 -->
            <div class="input-group">
                <label for="userPw">비밀번호</label>
                <input type="password" id="userPw" placeholder="영문+숫자+특수문자 8~16자">
                <div id="userPwMsg" class="message"></div>
            </div>

            <!-- 이메일 입력 -->
            <div class="input-group">
                <label for="userEmail">이메일</label>
                <input type="email" id="userEmail" placeholder="example@gmail.com">
                <div id="userEmailMsg" class="message"></div>
            </div>

            <!-- 이름 입력 -->
            <div class="input-group">
                <label for="userName">이름</label>
                <input type="text" id="userName" placeholder="한글 2~5자">
                <div id="userNameMsg" class="message"></div>
            </div>

            <button type="submit" class="submit-btn">가입하기</button>

        </form>
    </div>

    <script>
        const regexPatterns = {
            userId: /^[a-z0-9]{5,12}$/,
            userPw: /^(?=.*[A-Za-z])(?=.*\d)(?=.*[!@#$%^&*])[A-Za-z\d!@#$%^&*]{8,16}$/,
            userEmail: /^[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\.[A-Za-z]{2,}$/,
            userName: /^[가-힣]{2,5}$/
        };

        const messages = {
            userId : {
                success : "사용 가능한 아이디입니다.",
                error : "아이디는 영문 소문자와 숫자만 사용하여 5~12자로 입력하세요."
            },
             userPw : {
                success : "사용 가능한 비밀번호입니다.",
                error : "비밀번호는 영문, 숫자, 특수문자를 포함하여 8~16자로 입력하세요."
            },
            userEmail : {
                success : "올바른 이메일 형식입니다.",
                error : "이메일 형식이 올바르지 않습니다."
            },
            userName : {
                success : "올바른 이름입니다.",
                error : "이름은 한글 2~5자로 입력하세요."
            }
        };

        function checkInput(inputId, msgId, pattern, msgText){
            const input = document.getElementById(inputId).value;
            const msgDiv = document.getElementById(msgId);
            

            if(input === ""){
                msgDiv.textContent = "";
                msgDiv.className = "message";
                return false;
            }

            if(pattern.test(input)){
                msgDiv.textContent = msgText.success;
                msgDiv.className = "message success";
                return true;
            }else{
                msgDiv.textContent = msgText.error;
                msgDiv.className = "message error";
                return false;
            }

        }

        document.getElementById("userId").addEventListener("input",() =>{
            checkInput("userId", "userIdMsg", regexPatterns.userId, messages.userId);
        });
        
        document.getElementById("userPw").addEventListener("input",() =>{
            checkInput("userPw", "userPwMsg", regexPatterns.userPw, messages.userPw);
        });

        document.getElementById("userEmail").addEventListener("input",() =>{
            checkInput("userEmail", "userEmailMsg", regexPatterns.userEmail, messages.userEmail);
        });

        document.getElementById("userName").addEventListener("input",() =>{
            checkInput("userName", "userNameMsg", regexPatterns.userName, messages.userName);
        });
        

        function validateForm(event){
            event.preventDefault();

            const isIdValid = checkInput("userId", "userIdMsg", regexPatterns.userId, messages.userId);
            const isPwValid = checkInput("userPw", "userPwMsg", regexPatterns.userPw, messages.userPw);
            const isEmailValid = checkInput("userEmail", "userEmailMsg", regexPatterns.userEmail, messages.userEmail);
            const isNameValid = checkInput("userName", "userNameMsg", regexPatterns.userName, messages.userName);

            if(isIdValid && isPwValid && isEmailValid && isNameValid){
                alert("회원가입 조건이 모두 충족 되었습니다.");
            }else{
                alert("입력 항목을 다시 확인해 주세요.")
            }
        }
    </script>
</body>
</html>
