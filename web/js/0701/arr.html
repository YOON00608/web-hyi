<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>배열</title>
    <script>
        // 배열 : 여러 개의 데이터를 효율적으로 관리하기 위한 자료구조

        // 배열을 생성하는 방법
        // 1. [] 리터럴 사용하기
        let arr = []; // 비어있는 배열 생성
        document.write('arr 배열의 길이 : ', arr.length,'<br>'); // 0
        
        // 2. 생성자를 사용하기
        let arr2 = Array(3); // 3개의 공간이 empty로 채워짐
        let arr3 = new Array(3);

        document.write('arr2 배열의 길이 : ', arr2.length, '<br>'); // 3
        document.write('arr3 배열의 길이 : ', arr3.length, '<br>'); // 3
        // empty : 배열에 빈 칸을 표시할 때 사용하는 단어
        // ㄴ 배열의 크기만 먼저 만들고 나중에 값을 넣기 위해 사용한다.

        document.write('<hr>')

        // 배열에 요소 넣기 : 배열명[index]
        arr[0] = 10;
        arr[1] = 20;
        arr[2] = 30;
        document.write('arr에 들어간 요소 :', arr , '<br>')
        // document.write를 하면 toString 한 효과가 있다.
        document.write('arr[0]에 들어간 요소 :',arr[0],'<br>'); // 특정 요소 출력도 가능

        document.write('<hr>')

        // 반복문으로 출력하기
        for(let i = 0; i < arr.length; i++){
            document.write('반복문 : ',arr[i],'<br>')
        }

        document.write('<hr>')

        // 배열에 포함된 메서드
        // ㄴ 인덱스만으로는 불편하기 때문에 사용한다.

        // 예를 들어 배열의 길이를 모른다면? 
        // arr.length -1을 하면 되는데, 중간에 값을 추가하거나 삭제 하는 건 어렵다.
        
        // push(값) : 맨 뒤에 추가
        arr.push(40);
        document.write('push(40) :', arr , '<br><br>');

        // pop() : 맨 뒤에 있는 요소를 삭제하고 그 값을 반환
        document.write('pop() :', arr.pop() , '<br><br>');

        // unshift() : 맨 앞에 추가
        arr.unshift(0);
        document.write('unshift(0) :', arr , '<br><br>');

        // shift() : 맨 앞에 있는 요소를 삭제하고 그 값을 반환
        document.write('shift() :', arr.shift() , '<br><br>');

        // slice() : 배열 자르기
        // 원본은 그대로 두고 일부만 복사
        arr = [10,20,30,40,50];
        let result = arr.slice(1,4); // 원본은 안 바뀐다.
        
        document.write('arr :', arr , '<br>');
        document.write('slice(1,4) :', result , '<br><br>'); 

        // splice() : 원본을 수정
        arr = [10,20,30,40];
        arr.splice(1,2); // = index 1부터 2개를 삭제

        document.write('splice(1,2) :', arr , '<br><br>'); 

        // splice를 이용한 추가
        arr.splice(1,0,100); // index 1번 위치에 (0개를 삭제하고) 100을 추가한다.
        document.write('splice(1,0,100) :', arr , '<br><br>');

        document.write('<hr>')

        // 탐색과 포함여부 확인하는 메서드
        let names = ['kim','lee','park'];
        document.write('indexOf() : ',names.indexOf('lee') , '<br><br>');

        // includes : 요소를 포함하면 true, 없으면 false
        document.write('includes() : ',names.includes('choi') , '<br><br>');

        // find(조건);
        document.write('find() : ',[5,10,12,15,8].find(n => n > 10) , '<br><br>');


        // findIndex() : 위치 찾기
        document.write('findIndex() : ', [5,10,12,15,8].findIndex(n => n > 10),'<br><br>');
        
        // some() : 배열중에서 조건을 하나라도 만족하면 true
        document.write('some() : ', [5,10,12,15,8].some(n => n > 10),'<br><br>');

        // every() : 요소가 조건을 모두 만족하면 true
        document.write('every() : ', [5,10,12,15,8].every(n => n > 10),'<br><br>');

        document.write('<hr>')

        // 정렬과 뒤집기
        // sort() : 정렬
        document.write('sort() : ', [10,7,9,1,6,3,,2,4,5].sort((a,b) => a-b),'<br><br>');

        // reverse() : 순서를 뒤집기
        document.write('reverse() : ', [1,2,3,4,5].reverse(),'<br><br>');

        document.write('<hr>')

        // 스프레드 연산자
        // ...
        // 배열이나 객체의 값을 "펼쳐서" 복사하거나 전달할 때 사용하는 문법
        document.write("<h3>스프레드 연산자</h3>");

        arr = [10,20,30];
        document.write('arr : ',arr,'<br><br>'); // 배열의 요소를 하나의 문자열로 출력
        document.write('...arr : ',...arr,'<br><br>'); // 배열 안의 값을 하나씩 펼쳐서 출력

        // 배열을 복사할 때 많이 사용 한다.
        let original = [1,2,3];
        let copy = [...original];
        document.write('original의 copy : ',copy,'<br><br>');

        // 배열 합치기 할 때도 사용한다.
        let front = [1,2];
        let back = [3,4];

        let result2 = front.concat(back);

        document.write('concat : ',result2,'<br><br>');

        result2 = [...front, ...back];
        document.write('스프레드 연산자로 합치기 : ',result2,'<br><br>');

        // 배열 중간에 값 넣기
        let numbers = [2,3,4];

        result = [1, ...numbers, 5];
        document.write('배열 중간에 값 넣기 : ',result,'<br><br>');

    </script>
</head>
<body>
    
</body>
</html>
