<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        // 버튼을 클릭하면 배열에서 베뉴 하나를 랜덤으로 선택하여 결과 영역에 출력하기
        // 난수 뽑기 : Math.random()
        function menuTable(){
            
            let menus = [
                "김치찌개",
                "돈까스",
                "비빔밥",
                "햄버거",
                "초밥",
                "짜장면"
                ];

            let randomIndex =  Math.floor(Math.random()*menus.length);

            document.getElementById('result').innerHTML = menus[randomIndex];
        }

        function fruitadd(){

        }


        // 과일 목록을 저장할 배열 선언
        let fruitList = [];

        // 배열의 내용을 화면(ul)에 출력하는 공통 함수
        function renderList(){
            let ulElement = document.querySelector('ul');

            ulElement.innerHTML = '';

            fruitList.forEach(function(fruit){
                let li = document.createElement('li');
                li.textContent = fruit;
                ulElement.appendChild(li);
            });
        }

        // 1. 추가버튼을 누르면 입력한 과일을 배열의 맨 뒤에 추가한다.
        // 2. 입력한 과일이 이미 배열에 존재한다면 "이미 등록된 과일입니다" 경고창 띄운다.
        // 3. 변경된 배열의 내용을 ul에 출력
        // 4. input을 비운다.
        
        // 추가 버튼
        function addFruit(){
            let input = document.getElementById('fruitInput');
            let fruitValue = input.value.trim();

            if (fruitList.includes(fruitValue)){
                alert("이미 등록된 과일입니다.");
                input.value = "";
            }else{
                fruitList.push(fruitValue);
                renderList();
            }

            
            
        }

        // 삭제 버튼을 누르면 배열의 마지막 요소를 삭제하고 ul에 반영하기
        // 삭제 버튼
        function remove(){
        
            fruitList.pop();
            renderList();
        }


    </script>
</head>
<body>
    <h1>점심 메뉴 추천기</h1>
    <!-- 메뉴 추천 버튼 -->
    <button onclick="menuTable()">메뉴 추천</button>

    <!-- 결과를 출력 -->
    <div id="result"></div>

    <hr>

    <h1>과일 목록 관리</h1>
    <!-- 과일 이름을 입력받기 -->
    <input id="fruitInput" placeholder="과일을 입력하세요">

    <!-- 추가 버튼, 삭제 버튼 -->
    <button onclick="addFruit()">추가</button>
    <button onclick="remove()">삭제</button>

    <!-- 과일 목록을 출력할 ul -->
    <h2>과일 목록</h2>
    <ul id="fruitList"></ul>

</body>
</html>
