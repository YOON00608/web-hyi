<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>수강생 관리 프로그램</title>
    
</head>
<body>
    <h2>정보 입력 칸</h2>
    이름 <input type="text" id="name"><br>
    과목 <input type="text" id="subject"><br>
    점수 <input type="number" id="score"><br><br>

    <button onclick="addStudent()">추가</button>
    
    <hr>

    <h2>수강생 목록</h2>
    <table>
        <thead>
            <tr>
                <th>이름</th>
                <th>과목</th>
                <th>점수</th>
                <th>합격 여부</th>
            </tr>
        </thead>
        <tbody id="studentList">
            </tbody>
    </table>

    <script>
        // 초기 학생 데이터 배열
        let students = [
            {name : "김철수", subject : "java", score : 90},
            {name : "홍길동", subject : "javaScript", score : 55},
            {name : "이영희", subject : "HTML/CSS", score : 85}
        ];

        // [기능 1] 학생 목록을 테이블 양식에 맞춰 출력하는 함수
        function printStudents(){
            let html = "";
            for(let i = 0; i < students.length; i++){
                // 점수가 60점 이상이면 합격, 미만이면 불합격
                let result = "";
                let resultClass = "";
                if (students[i].score >= 60) {
                    result = "합격";
                    resultClass = "pass";
                } else {
                    result = "불합격";
                    resultClass = "fail";
                }

                // 테이블 행(tr)과 열(td) 구성
                html += "<tr>";
                html += "<td>" + students[i].name + "</td>";
                html += "<td>" + students[i].subject + "</td>";
                html += "<td>" + students[i].score + "점</td>";
                html += "<td class='" + resultClass + "'>" + result + "</td>";
                html += "</tr>";
            }
            document.getElementById("studentList").innerHTML = html;
        }
        
        // [기능 2] 학생 추가하기 함수
        function addStudent(){
            // 각 input 요소의 값 가져오기
            let nameInput = document.getElementById("name").value.trim();
            let subjectInput = document.getElementById("subject").value.trim();
            let scoreInput = document.getElementById("score").value.trim();

            // 1. 입력값 검사 (하나라도 비어있는 경우 정지)
            if(nameInput === "" || subjectInput === "" || scoreInput === "") {
                alert("모든 값을 입력하세요");
                return; // 함수 종료
            }

            // 2. 새로운 학생 객체 생성 (점수는 숫자로 변환)
            let newStudent = {
                name: nameInput,
                subject: subjectInput,
                score: Number(scoreInput)
            };

            // 3. 배열에 추가
            students.push(newStudent);

            // 4. 입력창 초기화
            document.getElementById("name").value = "";
            document.getElementById("subject").value = "";
            document.getElementById("score").value = "";

            // 5. 갱신된 배열로 화면 다시 그리기
            printStudents();
        }

        // 페이지 로드 시 최초 1회 목록 출력
        printStudents();
    </script>
</body>
</html>
