<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>데이터 타입</title>
    <script>
        // ※ 자료형이란? : 값의 종류를 의미한다.
        
        // 자료형의 큰 분류
        // - 원시 자료형 : 하나의 값 자체를 저장. 숫자, 문자, 논리형
        // - 참조 자료형 : 여러 값을 묶거나 기능을 가진 객체. 배열, 객체, 함수

        // 1. 원시 자료형
        // Number 숫자형 : 숫자를 표현하는 자료형
        // js에서는 정수와 실수 따로 구분없이 둘 다 Number을 사용한다.
        document.write('<h1>숫자형</h1>')

        let age = 20;
        let price = 15000;
        let temperature = 36.5;

        // typeof 연산자를 통해 값의 타입을 확인할 수 있다.
        document.write(typeof age +'<br>'); // Number
        document.write(typeof temperature +'<br>'); // Number

        document.write('<h3>연산</h3>')
        // 연산도 가능하다
        let x = 10;
        let y = 3;

        document.write(x + y +'<br>');

        // Infinity
        document.write('<h3>Infinity</h3>')
        document.write(10/0 +'<br>'); // 무한대

        // NaN(Not a Number)
        document.write('<h3>NaN(Not a Number)</h3>')
        document.write('abc' * 3 +'<br>');
        document.write(typeof NaN +'<br>');
        

        // 문자열 : 문자를 표현하는 자료형('' , "" , `` 다 가능)
        document.write('<hr>');
        document.write('<h1>문자열</h1>')

        let name = "홍길동";
        let greet = 'hello';
        let msg = `안녕하시오`;
        
        document.write(typeof name +'<br>');
        document.write(typeof greet +'<br>');
        document.write(typeof msg +'<br>');

        
        // 논리형(boolean) : 참/거짓을 표현한다.
        document.write('<hr>');
        document.write('<h1>논리형</h1>');

        let isLogin = true;
        let isAdmin = false;

        document.write(typeof isLogin +'<br>');
        document.write(typeof isAdmin +'<br>');

        document.write('<hr>');
        document.write('<h1>undefined</h1>');
        // undefined : 변수는 선언했지만 값이 들어가지 않은 상태

        let userName;
        document.write(userName +'<br>');
        document.write(typeof userName +'<br>');

        document.write('<hr>');
        document.write('<h1>Null</h1>');
        // Null : 값이 없다는 것을 개발자가 의도적으로 넣은 값
        let selectedUser = null;
        document.write(selectedUser +'<br>');

        let a; // undefined
        let b = null; // null

        document.write('<hr>');
        document.write('<h1>bigint</h1>');
        // bigint : 아주 큰 정수를 표현할 때 사용. 끝에 n을 붙인다.
        let bigNumber = 123456789012345678901234567890n;
        document.write(bigNumber +'<br>');
        document.write(typeof bigNumber +'<br>'); // bigint

        // 일반 number와 bigint는 바로 연산할 수 없다.
        a = 10n;
        b = 5;

        // document.write(a + b); -> 불가능
        document.write(a + BigInt(b));

        document.write('<hr>');
        document.write('<h1>symbol</h1>');
        // symbol() : 절대 중복되지 않는 고유한 값을 만들 때 사용하는 자료형
        let id1 = Symbol();
        let id2 = Symbol();

        document.write(typeof id1 +'<br>');
        document.write(typeof id2 +'<br>');
    </script>
</head>
<body>
    
</body>
</html>
