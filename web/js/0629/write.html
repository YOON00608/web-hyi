<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>자바스크립트</title>
    <!-- 자바 스크립트를 사용하기 위해서는 <script> ~ </script> 태그가 필요하다.
         head, body 어느 쪽에 위치하든 괜찮다. -->

    <!--※ head에 작성하는 script 태그
        - HTML 문서가 파싱되는 동안에 로드되며, 페이지의 렌더링을 차단할 수 있다.
        - 스크립트가 로드 되기 전까지는 다른 리소스들이 로딩 되지 않는다.
        - 자원의 초기설정과 관련된 스크립트를 넣는다. -->

    <!-- 외부에 있는 js 파일 불러오기 -->
     <script src="index.js"></script>
</head>
<body>
    <!--※ body에 작성하는 script 태그
        - 페이지의 렌더링이 진행되는 중에 로드되기 때문에, 페이지의 다른 내용들은 먼저 로드되고 렌더링 된다.
        - 동적으로 생성되는 컨텐츠와 이벤트 처리와 관련된 스크립트를 위치시킨다. -->
    
    <script>
        // document 객체 : JS가 제공하는 웹 페이지 자체를 의미하는 객체
        document.write('안녕하세요');
        
        document.createElement('input'); // = input태그를 만든다.
        document.body.appendChild(document.createElement('input')); // 출력
    </script>


</body>
</html>
