<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        
        function checkGrade(){
            let score = Number(document.getElementById('score').value);
            let grade = "";
            
            if(score >= 90){
                grade = "A";
            }else if(score >= 80){
                grade = "B";
            }else if(score >= 70){
                grade = "C";
            }else if(score >= 60){
                grade = "D";
            }else {
                grade = "F";
            }

            document.getElementById('result').innerText = grade;
        }
    
    </script>
</head>
<body>
    <label>
        <input type="number" id="score">
    </label>
    <button onclick="checkGrade()">조회</button>

    <h3 id="result"></h3>
</body>
</html>
