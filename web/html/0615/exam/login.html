<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 실습</title>
</head>
<body>
    <h1>멤버 로그인</h1>
    
        <label for="email" >이메일</label>
        <input type="email" id="email">
    <br>
        <label for="password">비밀번호</label>
        <input type="password" placeholder="비밀번호 입력" id="password">
    <br>
        <button>로그인</button>
    <br>
        <input type="checkbox"> 아이디 저장

    <hr>

    <h1>회원 등록</h1>
    <br>
        <label for="name">First Name</label>
        <input type="text" id="name">
    
    <br><br>
        <label for="name">Last Name</label>
        <input type="text" id="name">
    
    <br><br>
        <label for="email">Email</label>
        <input type="email" id="email">
    
    <br><br>
        <label for="gender">Gender</label>
        <br>
        <input type="radio" name="gender" id="gender"> Male
        <input type="radio" name="gender" id="gender"> Female
    
    <br><br>
        <label for="favorite Language">Favorite Language</label>
        <br>
        <input type="checkbox" name="favorite" id="favorite Language"> HTML
        <input type="checkbox" name="favorite" id="favorite Language"> Java
        <input type="checkbox" name="favorite" id="favorite Language"> PHP

    <br><br>
        <label for="university">University</label>
        <br>
        <select name="university" id="university">
            <option>대학교 선택</option>
        </select>
    
    <br><br>
        <label for="favorite Color">Favorite Color</label>
        <br>
        <input type="color" id="favorite Color">

    <br><br>
        <label for="birth Date">Birth Date</label>
        <br>
        <input type="date" id="birth Date">

    <br><br>
        <button>Registration</button>
</body>
</html>
