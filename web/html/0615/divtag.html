<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>div 태그</title>
</head>
<body>
    <!-- body 문서 안에서 각 영역의 세션을 구분 정의한다. -->
    <!-- 구역을 나누는 태그, 가로줄 전체를 차지한다. -->
    <!-- 특정 영역별로 묶어서 표시 되어야 할 태그들을 하나의 영역으로
        합쳐서 관리할 수 있도록 해주는 태그 -->

        <div>
            <a href="#">메뉴1</a>
            <a href="#">메뉴2</a>
            <a href="#">메뉴3</a>
        </div>

        <div>
            <a href="#">메뉴4</a>
            <a href="#">메뉴5</a>
            <a href="#">메뉴6</a>
        </div>

        <p>나는 p태그다</p>
        <p>나는 p태그다2</p>
</body>
</html>
