<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시맨틱 태그</title>
</head>
<body>
    <!-- header : 사이트의 도입부, 머릿부분에 사용이 되고 사이트의 로고나 제목 등을 기술 -->
    <!-- 안에 부수적인 태그들이 추가적으로 들어갈 수 있다. ex) 검색창, 사이트 메뉴 -->
    <header>
        <h1>코딩 새싹 블로그</h1>
        <!-- nav : 네비게이션 표현을 위한 태그 -->
        <!-- 동일한 사이트 안 다른 문서나 사이트의 문서로 연결하는 링크들의 모음을 가진다. -->
        <nav>
            <a href="#about">소개</a>
            <a href="#posts">글 목록</a>
            <a href="#contact">연락처</a>
        </nav>
    </header>

    <!-- main : 해당 페이지의 메인 콘텐츠를 나타낼 때 사용 -->
    <!-- 반드시 한 번만 사용 되어야 한다. -->
    <main>
        <!-- section : 하나 당 하나의 주제가 묶이는 태그 -->
        <section id="about">
            <h2>이 블로그는 무엇을 다루는가</h2>
            <p>웹 개발 입문자를 위한 초간단 학습 노트를 공유한다.</p>
        </section>

        <section id="posts">
            <h2>최근 글</h2>
            
        <!-- article : 독립적으로 재사용 가능한 글이나 게시물 단위 -->
            <article>
                <h3>HTML5 기본 구조 정복하기</h3>
                <p>시작은 가볍지만 중요한 개념을 담았다.</p>
                <time datetime="2025-10-21">2025년 10월 21일</time>
            </article>
        </section>

        <!-- aside : 보조 정보(광고, 참고 링크 등등) -->
        <aside>
            <h2>참고 링크</h2>
            <ul>
                <li><a href="https://developer.mazila.org/ko/">MDN 문서</a></li>
            </ul>
        </aside>
    </main>

    <!-- footer : 페이지나 섹션의 바닥글(저작권, 연락처, 소셜 미디어 링크) -->
    <footer id="content">
        <small>&copy; 2025 코딩 새싹이다</small>
    </footer>
</body>
</html>
