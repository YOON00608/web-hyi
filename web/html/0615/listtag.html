<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리스트(Lists)태그</title>
</head>
<body>
    <!-- 목록을 보여주는 태그 -->
    <!-- 1. 순서가 없는 리스트(ul) -->
        <ul>
            <li>홍길동</li>
            <li>김길동</li>
            <li>박길동</li>
            <ul>
                <li>깊이가 있는 리스트</li>
                <li>들여쓰기 가능</li>
            </ul>
        </ul>

    <!-- 2. 순서가 있는 리스트(ol) -->
        <ol type="A">
            <li>물을 끓인다.</li>
            <li>스프를 넣는다.</li>
            <li>면을 넣는다.</li>
            <ol>
                <li>깊이가 있는 리스트</li>
                <li>들여쓰기는 가능</li>
                <li>근데 숫자로 나옴</li>
            </ol>
        </ol>
</body>
</html>
