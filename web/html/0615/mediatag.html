<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>미디어 태그(media)</title>
</head>
<body>
    <!-- 이미지(img)태그 : 웹 페이지에서 이미지를 표시하기 위해 사용한다. -->
    <!-- 필수 속성
        1. src : 이미지 경로를 지정
        2. alt : 이미지 대체 문구(이미지가 노출되지 않는 경우에 대체 노출되는 문구)
        
        width, height 속성 : 이미지의 너비와 높이를 지정할 수 있다. -->

        <!-- ./ : 현재 자신의 위치 -->
        <!-- ../ : 상위 경로 -->
        <p>
            <img src="../img/dog.jpg" alt="dog">
        </p>

        <p>
            <!-- / : 루트 경로를 의미 -->
            <img src="/img/dog.jpg" alt="dog" width = "150px">
            <!-- 웹에서 주소 복사해서 사용 가능 -->
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSZtmcKMAebCm9m1vdU5CJvbCUKMNLnaw3IRw&s" alt="dog" width = "150px">
        </p>
</body>
</html>
