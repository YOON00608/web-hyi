<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>label 태그</title>
</head>
<body>
    <!-- 입력 요소의 설명(이름표)을 붙여주는 태그 -->
    <label>
        HTML
        <input type="checkbox">
    </label>

    <br>

    <label>
        남자
        <input type="radio">
    </label>

    <!-- label에 for 속성을 지정해서 사용하는 방법 -->
    <!-- for 와 id가 서로 연결된다. 브라우저는 label이 이름 입력창이라고 이해한다. -->
    <br>
    <label for="username">
        이름
    </label>

    <input type="text" id="username">
</body>
</html>
