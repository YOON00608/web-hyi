<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>서식(Text Formatting) 태그</title>
</head>
<body>
    <!-- 텍스트 서식을 표현할수 있는 태그 -->
    
    <!-- b 태그 : 굵은 텍스트 정의 -->
    <!-- strong 태그 : 중요한 텍스트 정의  -->
        <p><b>단락</b>을 구별하는 <strong>태그</strong>는 p태그이다.</p>

    <!-- i 태그 : 기울임 꼴 텍스트 정의 -->
    <!-- em 태그 : 강조된 텍스트 정의 -->
        <p><i>링크 태그</i></p>
        <p><em>링크 태그2</em></p>

    <!-- del 태그 : 취소선 -->
        <p>My favorite color is <del>black</del> red.</p>

    <!-- small 태그 : 작은 글씨 -->
        <p>HTML <small>Small</small> Formatting</p>
    
    <!-- mark 태그 : 하이라이트 -->
        <p>HTML <mark>Marked</mark> Formatting </p>
    
    <!-- sub 태그 : 아래 첨자 텍스트 정의 -->
    <!-- sup 태그 : 윗 첨자 텍스트 정의 -->
        <p>This is <sub>subscripted</sub> text</p>
        <p>This is <sup>supscripted</sup> text</p>
</body>
</html>
