<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>span 태그</title>
</head>
<body>
    <!-- 일반적으로 텍스트에 색, 크기, 좌우간격을 조절하는데 사용된다. -->

        <p>
            My Mother has <span style="color: blue;">blue eyes</span> and 
            my Father has <span style="color: darkolivegreen;">green eyes</span>
        </p>

</body>
</html>
