<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML 테이블(Tables)</title>
</head>
<body>
    <!-- <table> ~ </table> : 테이블을 만들어주는 태그 -->
    <!-- <tr> : 행을 만들어주는 태그 -->
    <!-- <td> : 열을 만들어주는 태그 -->
    <!-- <th> : 테이블 헤더로 테이블 각 열을 대표하는 셀 -->
    <table border="1">
        <tr>
            <td>1행 1열</td>
        </tr>
    </table>

    <hr>

    <table border="1">
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
    </table>

    <hr>

    <table border="1">
        <tr>
            <td>1행 1열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
        </tr>
    </table>

    <hr>

    <table border="1">
        <caption>테이블 제목</caption>
        <tr>
            <td>1행 1열</td>
            <td>1행 2열</td>
        </tr>
        <tr>
            <td>2행 1열</td>
            <td>2행 2열</td>
        </tr>
    </table>

    <hr>

    <!-- 열 합치기 -->
     <table border="1">
        <tr>
            <td colspan="3" align="center">메뉴판</td>
        </tr>
        <tr>
            <td>짜장면</td>
            <td>짬뽕</td>
            <td>탕수육</td>
        </tr>
     </table>

     <hr>

     <!-- 행 합치기 -->
      <table border="1">
            <tr>
                <td rowspan="2">메뉴판</td>
                <td>짜장</td>
            </tr>
            <tr>
                <td>짬뽕</td>
            </tr>
      </table>

      <hr>

      <table border="1">
        <caption>주요 SNS 서비스별 이용률(%)</caption>
        <tr>
            <td></td>
            <td><b>페이스북</b></td>
            <td><b>카카오스토리</b></td>
            <td><b>밴드</b></td>
            <td><b>인스타그램</b></td>
            <td><b>트위터</b></td>
        </tr>
        <tr>
            <td><b>2015년</b></td>
            <td>77.1</td>
            <td>58.3</td>
            <td>32.4</td>
            <td>16.7</td>
            <td>22.1</td>
        </tr>
        <tr>
            <td><b>2016년</b></td>
            <td>73.8</td>
            <td>51.0</td>
            <td>40.1</td>
            <td>28.1</td>
            <td>14.7</td>
        </tr>
      </table>

      <hr></hr>

      <table border="1">
        
        <!-- 표의 제목 부분 -->
        <!-- 보통 컬럼명을 th를 이용해서 작성한다. -->
        <thead>
            <tr>
                <th>이름</th>
                <th>과목</th>
                <th>점수</th>
            </tr>
        </thead>

        <!-- 실제 데이터가 들어가는 영역 -->
        <tbody>
            <tr>
                <td>김철수</td>
                <td>HTML</td>
                <td>90</td>
            </tr>

            <tr>
                <td>이영희</td>
                <td>CSS</td>
                <td>95</td>
            </tr>

            <tr>
                <td>박민수</td>
                <td>JS</td>
                <td>70</td>
            </tr>
        </tbody>

        <!-- 표의 맨 아래 요약 정보를 작성한다. -->
        <!-- 합계, 평균, 결과, 통계 -->
        <tfoot>
            <td colspan="2">평균 점수</td>
            <td>85</td>
        </tfoot>
      </table>






</body>
</html>
